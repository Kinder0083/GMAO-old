# ============================================================
# FSAO Iris - Regles Anti-Cache pour NGINX (production)
# ============================================================
# Ajoutez ces directives dans votre bloc server {} sur Proxmox
# dans /etc/nginx/sites-available/gmao-iris
#
# Ces regles empechent le navigateur de garder les anciens fichiers
# apres une mise a jour, eliminant le besoin de Ctrl+Shift+F5
# ============================================================

# index.html : JAMAIS mis en cache (charge toujours la derniere version)
location = /index.html {
    root /opt/gmao-iris/frontend/build;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# Service Worker : JAMAIS mis en cache (detecte les mises a jour)
location = /sw.js {
    root /opt/gmao-iris/frontend/build;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# manifest.json : pas de cache (contient la version PWA)
location = /manifest.json {
    root /opt/gmao-iris/frontend/build;
    add_header Cache-Control "no-cache" always;
}
